{% extends 'boutique/base.html' %}
{% block content %}
<style>
.form-wrapper{max-width:500px;margin:3rem auto;padding:0 2rem}
.form-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;margin-bottom:2rem;padding-bottom:1rem;border-bottom:2px solid var(--gold)}
.form-title span{color:var(--gold);font-style:italic}
.form-group{margin-bottom:1.5rem}
.form-label{display:block;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:0.5rem}
.form-input{width:100%;border:1px solid var(--border);padding:12px 16px;font-family:'Montserrat',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.3s;background:var(--white)}
.form-input:focus{border-color:var(--gold)}
.form-actions{display:flex;gap:1rem;margin-top:2rem}
.produit-info{background:var(--cream);padding:1rem 1.5rem;margin-bottom:2rem;font-size:0.85rem}
.produit-info strong{color:var(--gold)}
</style>

<div class="form-wrapper">
  <h2 class="form-title">Ajouter une <span>Taille</span></h2>

  <div class="produit-info">
    Produit : <strong>{{ produit.nom }}</strong>
  </div>

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Taille *</label>
      <input type="text" name="taille" class="form-input" required placeholder="ex: S, M, L, XL, XXL">
    </div>
    <div class="form-group">
      <label class="form-label">Stock *</label>
      <input type="number" name="stock" class="form-input" required min="0" placeholder="0">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Ajouter</button>
      <a href="/mon-admin/stock/" class="btn-outline">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
