{% extends 'boutique/base.html' %}
{% load static %}
{% block content %}
<style>
.hero{
  position:relative;
  overflow:hidden;
  padding:8rem 2rem;
  text-align:center;
  background:var(--cream);
  min-height:100vh;
  margin-bottom:0;
}
.hero-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.35;z-index:0}
.hero>*:not(.hero-video){position:relative;z-index:1}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:3.5rem;font-weight:300;line-height:1.2;margin-bottom:1.5rem}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-desc{font-size:0.85rem;color:var(--gray);max-width:500px;margin:0 auto 2rem;line-height:1.8}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
</style>

<div class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="{% static 'videos/hero.mp4' %}" type="video/mp4">
  </video>
  <h1 class="hero-title">L'élégance du<br><em>Traditionnel Tunisien</em></h1>
  <p class="hero-desc">Découvrez notre collection exclusive de vêtements traditionnels, alliant savoir-faire artisanal et modernité.</p>
  <div class="hero-btns">
    <a href="/catalogue/" class="btn-primary">Voir la Collection</a>
  </div>
</div>

{% endblock %}
