{% extends 'boutique/base.html' %}
{% block content %}
<style>
.commande-container{max-width:700px;margin:0 auto;padding:3rem 2rem}
.commande-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:1.5rem}
.form-label{display:block;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:0.5rem}
.form-input{width:100%;border:1px solid var(--border);padding:12px 16px;font-family:'Montserrat',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.3s}
.form-input:focus{border-color:var(--gold)}
.order-summary{background:var(--cream);padding:1.5rem;margin-bottom:2rem}
.order-summary h4{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin-bottom:1rem}
.order-line{display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:0.5rem;color:var(--gray)}
.order-total{display:flex;justify-content:space-between;font-weight:600;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);color:var(--gold)}
</style>

<div class="commande-container">
  <h2 class="commande-title">Finaliser la <span style="color:var(--gold);font-style:italic">Commande</span></h2>
  
  <div class="order-summary">
    <h4>Récapitulatif</h4>
    <div id="summaryLines"></div>
    <div class="order-total"><span>Total</span><span id="summaryTotal"></span></div>
  </div>

  <form method="POST" action="/commande/" onsubmit="prepareSubmit()">
    {% csrf_token %}
    <input type="hidden" name="panier" id="panierData">
    <div class="form-group">
      <label class="form-label">Nom Complet *</label>
      <input type="text" name="nom" class="form-input" required placeholder="Votre nom...">
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone *</label>
      <input type="text" name="telephone" class="form-input" required placeholder="+216 XX XXX XXX">
    </div>
    <div class="form-group">
      <label class="form-label">Adresse de Livraison *</label>
      <input type="text" name="adresse" class="form-input" required placeholder="Rue, Ville, Gouvernorat...">
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optionnel)</label>
      <textarea name="notes" class="form-input" rows="3" placeholder="Taille, couleur préférée..."></textarea>
    </div>
    <button type="submit" class="btn-primary" style="width:100%;padding:16px">Confirmer la Commande</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const cart = JSON.parse(localStorage.getItem('cart') || '[]');
const total = cart.reduce((s,i) => s + i.prix * i.qty, 0);
document.getElementById('summaryLines').innerHTML = cart.map(i =>
  `<div class="order-line"><span>${i.nom} ×${i.qty}</span><span>${(i.prix*i.qty).toFixed(3)} DT</span></div>`
).join('');
document.getElementById('summaryTotal').textContent = total.toFixed(3) + ' DT';

function prepareSubmit() {
  document.getElementById('panierData').value = JSON.stringify(cart);
  localStorage.removeItem('cart');
}
</script>
{% endblock %}
